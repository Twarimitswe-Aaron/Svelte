<!doctype html>
<html lang="en">
<!--
  WHY lang="en" here?
  WITH    → Screen readers use the correct language engine.
              Google indexes the page as English content.
  WITHOUT → Screen reader might read English words with a foreign language
              pronunciation engine, making the page unusable for blind users.
              WCAG 2.1 Success Criterion 3.1.1 (Level A) requires this.
-->
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/png" href="/favicon.png" />

		<!--
			══════════════════════════════════════════════════
			 PERFORMANCE: Non-blocking Google Fonts
			══════════════════════════════════════════════════

			WHY THIS IS IN app.html AND NOT <svelte:head>?
			  Svelte 5 treats event attributes as reactive bindings.
			  Writing onload="..." (a string) on a <link> inside <svelte:head>
			  throws: "Event attribute must be a JavaScript expression".
			  app.html is a raw HTML template the Svelte compiler never touches,
			  so plain HTML event handlers work perfectly here.

			STEP 1 — preconnect to fonts.googleapis.com
			   WITH    → Browser opens the TCP/TLS handshake immediately.
			              Saves ~150-300ms of connection setup later.
			   WITHOUT → Browser waits until it encounters the font URL before
			              opening the connection — wasted latency.

			  crossorigin="anonymous" is MANDATORY here:
			   WITH    → Browser knows it's a cross-origin request, reuses the
			              same preconnected socket for the actual font fetch.
			   WITHOUT → Browser opens a SECOND TCP connection because the modes
			              don't match, wasting the entire preconnect benefit.
		-->
		<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin="anonymous" />

		<!--
			STEP 2 — preconnect to fonts.gstatic.com
			  Why TWO preconnects?
			  fonts.googleapis.com → serves the CSS stylesheet (font-face declarations)
			  fonts.gstatic.com   → serves the actual .woff2 font FILES
			   WITH    → Both TCP connections opened early; fonts appear faster.
			   WITHOUT → The font file domain has no preconnected socket, adding
			              another round trip delay just for the font binaries.
		-->
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

		<!--
			STEP 3 — rel="preload" as="style" (non-blocking download)
			   WITH    → Browser downloads the font CSS file in the background
			              with high priority, WITHOUT blocking page rendering.
			              Users see styled text fast even on slow connections.
			   WITHOUT (using rel="stylesheet" directly):
			              The font stylesheet is "render-blocking" — the browser
			              STOPS painting the page until the font file is fully
			              downloaded. On a 3G connection this can be 1-3 seconds
			              of white screen. This tanks Core Web Vitals (LCP).

			onload="this.onload=null;this.rel='stylesheet'"
			  Once the CSS is cached in the browser:
			  1. this.onload=null  → prevents the handler firing twice
			  2. this.rel='stylesheet' → activates the font, no FOUC
		-->
		<link
			rel="preload"
			as="style"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
			onload="this.onload=null;this.rel='stylesheet'"
		/>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@latest/dist/fonts/geist-sans/style.css" />
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@latest/dist/fonts/geist-mono/style.css" />

		<!--
			STEP 4 — <noscript> fallback
			  The onload trick requires JavaScript. If a user has JS disabled
			  (search engine bots, privacy browsers, screen reader modes), the
			  font would never load.
			   WITH    → Fonts always load regardless of JS status.
			   WITHOUT → Users with JS disabled see the system fallback font
			              (system-ui / -apple-system) instead of Inter.
		-->
		<noscript>
			<link
				href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
				rel="stylesheet"
			/>
		</noscript>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<!--
			data-sveltekit-preload-data="hover"
			  PERFORMANCE: As soon as a user hovers over a link, SvelteKit starts
			  fetching the data for that page — BEFORE the click is registered.
			   WITH    → Navigations feel instantaneous; data is already loaded.
			   WITHOUT → User must click, then wait for data fetch + render.
		-->
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
